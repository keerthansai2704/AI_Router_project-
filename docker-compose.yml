version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: airouter_postgres
    environment:
      POSTGRES_USER: airouter
      POSTGRES_PASSWORD: airouter_pass
      POSTGRES_DB: airouter_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: airouter_redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: airouter_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data: